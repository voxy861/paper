<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>最強の白紙キャンバス</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; font-family: sans-serif; }
        canvas { background: white; cursor: crosshair; display: block; }
        .controls { position: fixed; top: 10px; left: 10px; display: flex; gap: 10px; z-index: 10; }
        button { padding: 10px 20px; cursor: pointer; border: none; background: #333; color: white; border-radius: 5px; font-size: 16px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="clearCanvas()">全部消す</button>
</div>

<canvas id="drawArea"></canvas>

<script>
    const canvas = document.getElementById('drawArea');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // 画面サイズに合わせる
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 描画設定（スマホ用に線を少し太くしたよ）
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'black';

    function start(e) {
        drawing = true;
        draw(e);
    }

    function end() {
        drawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault(); // スクロール防止

        // マウスとタッチの両方から座標を取る
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        if (!x || !y) return;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    // マウスイベント
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', end);

    // タッチイベント（iPhone用）
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', end);

    // 全消去
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
