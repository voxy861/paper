<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>最強の白紙キャンバス - 爆速計算メモ</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; background: white; overflow: hidden; }
        #clear-btn {
            position: absolute; top: 20px; left: 20px;
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            background: #ff4444; color: white; border: none; border-radius: 10px;
            z-index: 100;
        }
        canvas { display: block; touch-action: none; }
        .content { padding: 40px 20px; line-height: 1.6; color: #333; background: white; border-top: 5px solid #ddd; }
        h1 { font-size: 24px; color: #222; }
        h2 { font-size: 20px; margin-top: 30px; border-bottom: 2px solid #ff4444; display: inline-block; }
        .footer { margin-top: 50px; font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
<div id="canvas-container">
    <button id="clear-btn" onclick="clearCanvas()">全部消す</button>
    <canvas id="canvas"></canvas>
</div>
<div class="content">
    <h1>最強の白紙キャンバスへようこそ</h1>
    <p>このアプリは、暗算の練習やドローンの設計メモを爆速で書き留めるために開発されました。</p>
    <h2>主な機能</h2>
    <ul>
        <li>指一本でスラスラ描ける高精度キャンバス</li>
        <li>一瞬でリセットする「全部消す」ボタン</li>
    </ul>
    <h2>開発者について</h2>
    <p>中学生エンジニアのZhangが制作したシンプル追求ツールです。</p>
    <h2>プライバシーポリシー</h2>
    <p>広告配信のためにクッキーを使用することがあります。データは匿名です。</p>
    <div class="footer">&copy; 2026 Zhang Projects.</div>
</div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 6;
        ctx.strokeStyle = 'black';
    }
    window.addEventListener('resize', resize);
    resize();
    function start(e) { drawing = true; draw(e); }
    function end() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', end);
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
</script>
</body>
</html>
